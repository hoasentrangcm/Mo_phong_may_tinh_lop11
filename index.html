<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá Thùng máy tính 3D Thực tế</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e272e; font-family: Arial, sans-serif; }
        #info-panel {
            position: absolute; top: 20px; right: 20px; width: 340px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none; z-index: 10;
        }
        #info-panel h2 { margin-top: 0; color: #e74c3c; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        #info-panel p { margin: 10px 0 0 0; line-height: 1.5; font-size: 15px; color: #2c3e50; }
        #loading {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: #ecf0f1; font-size: 20px; font-weight: bold; pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.8);
            color: white; padding: 15px; border-radius: 8px; font-size: 14px; pointer-events: none;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Đang tải mô hình 3D thực tế (có thể mất vài giây)...</div>

    <div id="info-panel">
        <h2 id="part-name">Tên linh kiện</h2>
        <p><strong>📌 Chức năng:</strong> <span id="part-function"></span></p>
        <p><strong>⚙️ Thông số:</strong> <span id="part-specs"></span></p>
    </div>

    <div id="instructions">
        🖱️ Chuột trái: Xoay | 🖱️ Chuột phải: Di chuyển | 🖱️ Cuộn chuột: Phóng to/Thu nhỏ <br>
        🔓 <strong>Nhấp vào nắp thùng máy</strong> để mở ra.<br>
        🔍 <strong>Nhấp vào các linh kiện</strong> bên trong để xem thông tin!
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Dữ liệu sách giáo khoa
        const hardwareData = {
            "Mainboard": { name: "Bảng mạch chính", function: "Gắn kết bộ xử lí, bộ nhớ trong, bộ nhớ ngoài.", specs: "Nền tảng giao tiếp các thiết bị số." },
            "CPU": { name: "Bộ xử lí trung tâm (CPU)", function: "Thực hiện phép toán, điều khiển toàn bộ máy tính.", specs: "Tần số xung nhịp (GHz), số lõi." },
            "RAM": { name: "Bộ nhớ trong (RAM)", function: "Chứa dữ liệu tạm thời (Mất khi tắt máy).", specs: "Dung lượng (GB), thời gian truy cập." },
            "HDD": { name: "Bộ nhớ ngoài", function: "Lưu trữ dữ liệu lâu dài.", specs: "Dung lượng (GB, TB), tốc độ đọc/ghi." }
        };

        const scene = new THREE.Scene();
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let pcModel;
        let caseDoor; // Biến lưu trữ nắp thùng máy
        let isDoorOpen = false;

        // TẢI MÔ HÌNH THỰC TẾ
        const loader = new GLTFLoader();
        
        // CHÚ Ý: Đổi 'thung-may.glb' thành tên file bạn tải lên GitHub
        loader.load('thung-may.glb', function (gltf) {
            document.getElementById('loading').style.display = 'none';
            pcModel = gltf.scene;
            
            // Điều chỉnh kích thước và vị trí cho vừa màn hình
            pcModel.scale.set(1, 1, 1); 
            pcModel.position.set(0, -2, 0);
            scene.add(pcModel);

            // Tìm nắp thùng máy (Tuỳ thuộc vào file bạn tải, tên có thể là 'Door', 'Panel', 'Side_Glass'...)
            // Bạn có thể mở F12 (Console) nhấp vào nắp để xem tên nó là gì rồi điền vào đây
            pcModel.traverse((child) => {
                if (child.isMesh) {
                    // Ví dụ: Đặt nắp là có chữ "Panel" hoặc "Door" trong tên
                    if (child.name.toLowerCase().includes('panel') || child.name.toLowerCase().includes('door')) {
                        caseDoor = child; 
                    }
                }
            });

        }, undefined, function (error) {
            console.error(error);
            document.getElementById('loading').innerText = "Lỗi tải mô hình. Đảm bảo file .glb đã được đẩy lên GitHub đúng tên!";
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            if (pcModel) {
                const intersects = raycaster.intersectObjects(pcModel.children, true);
                if (intersects.length > 0) {
                    const clickedPart = intersects[0].object;
                    
                    // --- MẸO DÀNH CHO GIÁO VIÊN ---
                    // Nhấn F12 mở Console để xem tên thật của linh kiện bạn vừa bấm vào là gì
                    console.log("Bạn vừa nhấp vào:", clickedPart.name);
                    
                    // 1. Xử lý mở nắp thùng máy
                    if (clickedPart === caseDoor || clickedPart.name.toLowerCase().includes('panel')) {
                        if (!isDoorOpen) {
                            // Di chuyển nắp sang một bên (tạo hiệu ứng mở)
                            clickedPart.position.x += 5; 
                            isDoorOpen = true;
                        } else {
                            // Đóng lại
                            clickedPart.position.x -= 5;
                            isDoorOpen = false;
                        }
                        return; // Dừng lại, không hiện bảng thông tin khi nhấp nắp
                    }

                    // 2. Xử lý hiện thông tin linh kiện bên trong
                    // Dựa vào tên in ra ở Console, bạn gán nó vào từ khoá bên dưới
                    let dataId = null;
                    const partName = clickedPart.name.toLowerCase();
                    
                    if (partName.includes('cpu') || partName.includes('processor')) dataId = "CPU";
                    else if (partName.includes('ram') || partName.includes('memory')) dataId = "RAM";
                    else if (partName.includes('motherboard') || partName.includes('main')) dataId = "Mainboard";
                    else if (partName.includes('hdd') || partName.includes('drive')) dataId = "HDD";

                    if (dataId) {
                        document.getElementById("info-panel").style.display = "block";
                        document.getElementById("part-name").innerText = hardwareData[dataId].name;
                        document.getElementById("part-function").innerText = hardwareData[dataId].function;
                        document.getElementById("part-specs").innerText = hardwareData[dataId].specs;
                    }
                } else {
                    document.getElementById("info-panel").style.display = "none";
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
