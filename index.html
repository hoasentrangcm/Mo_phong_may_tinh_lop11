<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Thiết bị Máy tính 3D (Chi tiết)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info-panel {
            position: absolute; top: 20px; right: 20px; width: 340px;
            background: rgba(255, 255, 255, 0.95); padding: 25px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; z-index: 10; backdrop-filter: blur(5px);
        }
        #info-panel h2 { margin-top: 0; color: #e94560; border-bottom: 2px solid #e94560; padding-bottom: 10px; font-size: 22px;}
        #info-panel p { margin: 12px 0 0 0; line-height: 1.6; font-size: 15px; color: #0f3460; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; background: rgba(15, 52, 96, 0.8);
            color: #fff; padding: 15px 20px; border-radius: 8px; pointer-events: none; font-size: 14px; line-height: 1.5;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info-panel">
        <h2 id="part-name">Tên thiết bị</h2>
        <p><strong>📌 Chức năng:</strong> <span id="part-function"></span></p>
        <p><strong>⚙️ Thông số:</strong> <span id="part-specs"></span></p>
    </div>

    <div id="instructions">
        🖱️ Chuột trái: Xoay | 🖱️ Chuột phải: Di chuyển | 🖱️ Cuộn chuột: Phóng to/Thu nhỏ <br>
        ✨ Nhấp chuột vào từng linh kiện để xem thông tin chi tiết!
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Dữ liệu
        const hardwareData = {
            "Mainboard": { name: "Bảng mạch chính (Mainboard)", function: "Là nền tảng kết nối bộ xử lí, bộ nhớ trong, bộ nhớ ngoài và gắn các bảng mạch mở rộng.", specs: "Quyết định khả năng nâng cấp và tương thích của toàn hệ thống." },
            "CPU": { name: "Bộ xử lí trung tâm (CPU)", function: "Đảm nhận việc thực hiện các chương trình máy tính, thực hiện phép toán và điều khiển toàn bộ máy.", specs: "Tần số xung nhịp (GHz), số lõi (đơn vị xử lí)." },
            "RAM": { name: "Bộ nhớ trong (RAM)", function: "Ghi dữ liệu tạm thời trong khi chạy chương trình. Dữ liệu sẽ bị xoá khi tắt máy.", specs: "Dung lượng (GB) và thời gian truy cập trung bình." },
            "ROM": { name: "Bộ nhớ trong (ROM)", function: "Chỉ đọc, không thể ghi hay xoá. Lưu chương trình khởi động lâu dài, không cần nguồn nuôi.", specs: "Dung lượng nhỏ, thời gian truy cập lớn hơn RAM." },
            "HDD": { name: "Bộ nhớ ngoài (Ổ cứng)", function: "Lưu trữ dữ liệu và phần mềm lâu dài, không bị mất khi tắt nguồn.", specs: "Dung lượng (GB, TB) và tốc độ đọc/ghi dữ liệu." }
        };

        // 2. Cài đặt Scene cơ bản
        const scene = new THREE.Scene();
        // Ánh sáng chân thực hơn
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const spotLight = new THREE.SpotLight(0xffffff, 2000);
        spotLight.position.set(10, 30, 20);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        scene.add(spotLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2; // Không cho lật camera xuống dưới mặt đáy

        const objects = [];
        const group = new THREE.Group();
        scene.add(group);

        // Hàm hỗ trợ gán ID cho toàn bộ các mảnh ghép của một linh kiện
        function assignDataId(meshGroup, id) {
            meshGroup.traverse((child) => {
                if (child.isMesh) child.userData = { id: id };
            });
            objects.push(meshGroup);
        }

        // --- TẠO MÔ HÌNH CHI TIẾT ---

        // 1. CPU (Bộ xử lý)
        const cpuGroup = new THREE.Group();
        const cpuBase = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 3), new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 }));
        const cpuMetal = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 2.2), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 }));
        cpuMetal.position.y = 0.15;
        cpuGroup.add(cpuBase, cpuMetal);
        cpuGroup.position.set(-5, 5, -2);
        assignDataId(cpuGroup, "CPU");
        group.add(cpuGroup);

        // 2. RAM (Thanh nhớ)
        const ramGroup = new THREE.Group();
        const ramBoard = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.8, 6), new THREE.MeshStandardMaterial({ color: 0x0b5345, roughness: 0.9 }));
        const ramPins = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.2, 5.8), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9 })); // Chân mạ vàng
        ramPins.position.y = -0.8;
        ramGroup.add(ramBoard, ramPins);
        // Thêm chip nhớ màu đen
        for(let i = -2; i <= 2; i+=1.2) {
            const chip1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            chip1.position.set(0, 0.2, i);
            ramGroup.add(chip1);
        }
        ramGroup.position.set(5, 4, -2);
        assignDataId(ramGroup, "RAM");
        group.add(ramGroup);

        // 3. ROM (Chip BIOS)
        const romGroup = new THREE.Group();
        const romBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.8), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        const romLegs1 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 1.5), new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 1 }));
        romLegs1.position.y = -0.2;
        romGroup.add(romBody, romLegs1);
        romGroup.position.set(-6, 3, 4);
        assignDataId(romGroup, "ROM");
        group.add(romGroup);

        // 4. HDD (Ổ cứng kim loại)
        const hddGroup = new THREE.Group();
        const hddBase = new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.2, 6.5), new THREE.MeshStandardMaterial({ color: 0x2c3e50 }));
        const hddCover = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1.3, 6.2), new THREE.MeshStandardMaterial({ color: 0xbdc3c7, metalness: 0.6, roughness: 0.4 }));
        const hddDisk = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 1.4, 32), new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.8 }));
        hddDisk.position.set(0, 0, -0.5);
        hddGroup.add(hddBase, hddCover, hddDisk);
        hddGroup.position.set(4, 2, 4);
        assignDataId(hddGroup, "HDD");
        group.add(hddGroup);

        // 5. Mainboard (Bảng mạch chính)
        const mainGroup = new THREE.Group();
        const mainBoard = new THREE.Mesh(new THREE.BoxGeometry(16, 0.3, 12), new THREE.MeshStandardMaterial({ color: 0x17202a })); // Đen bo mạch
        // Đế cắm CPU (Socket)
        const cpuSocket = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.4, 3.5), new THREE.MeshStandardMaterial({ color: 0x7f8c8d }));
        cpuSocket.position.set(-4, 0, -2);
        // Khe cắm RAM (Slots)
        const ramSlot1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 6.5), new THREE.MeshStandardMaterial({ color: 0x34495e }));
        ramSlot1.position.set(4, 0, -2);
        const ramSlot2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 6.5), new THREE.MeshStandardMaterial({ color: 0x34495e }));
        ramSlot2.position.set(5.5, 0, -2);
        
        mainGroup.add(mainBoard, cpuSocket, ramSlot1, ramSlot2);
        mainGroup.position.set(0, -2, 0);
        assignDataId(mainGroup, "Mainboard");
        group.add(mainGroup);

        // --- TƯƠNG TÁC CHUỘT ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            // Tìm tất cả các mesh đang bị click
            const intersects = raycaster.intersectObjects(group.children, true);
            
            if (intersects.length > 0) {
                const selectedObj = intersects[0].object;
                if(selectedObj.userData.id) {
                    const id = selectedObj.userData.id;
                    document.getElementById("info-panel").style.display = "block";
                    document.getElementById("part-name").innerText = hardwareData[id].name;
                    document.getElementById("part-function").innerText = hardwareData[id].function;
                    document.getElementById("part-specs").innerText = hardwareData[id].specs;
                }
            } else {
                document.getElementById("info-panel").style.display = "none";
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Tạo hiệu ứng lơ lửng nhẹ nhàng cho các linh kiện
            const time = Date.now() * 0.001;
            cpuGroup.position.y = 5 + Math.sin(time * 2) * 0.2;
            ramGroup.position.y = 4 + Math.cos(time * 1.5) * 0.2;
            romGroup.position.y = 3 + Math.sin(time * 1.8) * 0.2;
            hddGroup.position.y = 2 + Math.cos(time * 2.2) * 0.2;
            
            group.rotation.y += 0.001; // Cụm xoay chậm toàn cảnh
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
